<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGIC Pro - Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; }
        .glass { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; transition: all 0.3s; }
        .active-tab { background: #1e293b; color: white; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <nav class="w-64 bg-white border-r border-slate-200 p-6 flex flex-col space-y-2">
        <div class="text-2xl font-black text-blue-600 mb-10 italic">SGIC PRO</div>
        <button onclick="showView('dashboard')" id="btn-dashboard" class="nav-btn p-4 rounded-xl flex items-center gap-3 font-bold active-tab">Dashboard</button>
        <button onclick="showView('pos')" id="btn-pos" class="nav-btn p-4 rounded-xl flex items-center gap-3 font-bold text-slate-500 hover:bg-slate-50">Terminal POS</button>
        <button onclick="showView('inventario')" id="btn-inventario" class="nav-btn p-4 rounded-xl flex items-center gap-3 font-bold text-slate-500 hover:bg-slate-50">Inventario</button>
        <button onclick="showView('config')" id="btn-config" class="nav-btn p-4 rounded-xl flex items-center gap-3 font-bold text-slate-500 hover:bg-slate-50">Configuración</button>
        <div class="mt-auto p-4 bg-slate-50 rounded-2xl text-[10px] font-bold text-slate-400 text-center uppercase tracking-widest border border-slate-100">Sistema Standalone v2.0</div>
    </nav>

    <!-- App Content -->
    <main class="flex-1 p-10 overflow-y-auto" id="main-content">
        <!-- Vistas se inyectan aquí -->
    </main>

    <script>
        // --- DATOS Y PERSISTENCIA ---
        let state = JSON.parse(localStorage.getItem('sgic_vanilla')) || {
            config: { name: "Estación Central", holgura: 15, base: 50 },
            tanques: [
                { id: 1, tipo: 'Gasolina', stock: 4500, total: 10000 },
                { id: 2, tipo: 'Diésel', stock: 3200, total: 8000 }
            ],
            ventas: [],
            clientes: [
                { placa: "ABC-123", estado: "Activo" },
                { placa: "XYZ-789", estado: "Suspendido" }
            ]
        };

        const save = () => localStorage.setItem('sgic_vanilla', JSON.stringify(state));

        // --- NAVEGACIÓN ---
        function showView(view) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab', 'text-slate-500'));
            document.getElementById(`btn-${view}`).classList.add('active-tab');
            
            const main = document.getElementById('main-content');
            
            if (view === 'dashboard') {
                const totalVentas = state.ventas.reduce((a,b)=> a+b.cant, 0).toFixed(1);
                main.innerHTML = `
                    <h1 class="text-3xl font-black text-slate-800 mb-8">Dashboard General</h1>
                    <div class="grid grid-cols-3 gap-6 mb-10">
                        <div class="glass p-8 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Gasolina Disponible</p>
                            <h3 class="text-3xl font-black text-slate-800">${state.tanques[0].stock} L</h3>
                        </div>
                        <div class="glass p-8 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Litros Despachados</p>
                            <h3 class="text-3xl font-black text-blue-600">${totalVentas} L</h3>
                        </div>
                        <div class="glass p-8 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Transacciones</p>
                            <h3 class="text-3xl font-black text-slate-800">${state.ventas.length}</h3>
                        </div>
                    </div>
                    <div class="glass p-8">
                        <h3 class="font-bold border-b pb-4 mb-4 text-slate-400 uppercase text-xs">Ventas Recientes</h3>
                        <div class="space-y-4">
                            ${state.ventas.slice(0,5).map(v => `
                                <div class="flex justify-between p-4 bg-slate-50 rounded-xl font-bold">
                                    <span>${v.placa}</span> <span class="text-blue-600">${v.cant} L</span>
                                </div>
                            `).join('') || '<p class="text-center text-slate-300 py-4 italic">No hay registros</p>'}
                        </div>
                    </div>
                `;
            }

            if (view === 'pos') {
                main.innerHTML = `
                    <div class="max-w-xl mx-auto" id="pos-container">
                        <div class="glass p-12 text-center shadow-xl space-y-8">
                            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center mx-auto text-2xl font-black">?</div>
                            <h2 class="text-3xl font-black">Terminal de Venta</h2>
                            <p class="text-slate-400 font-bold">Validación de Placa ANH</p>
                            <input id="input-placa" class="w-full text-center text-5xl font-black p-6 bg-slate-50 border-2 rounded-2xl outline-none focus:border-blue-500 uppercase" placeholder="ABC-123">
                            <button onclick="validarPOS()" class="w-full h-20 bg-blue-600 text-white rounded-3xl font-black text-xl shadow-lg hover:bg-blue-700">CONTINUAR</button>
                        </div>
                    </div>
                `;
            }

            if (view === 'inventario') {
                main.innerHTML = `
                    <h1 class="text-3xl font-black text-slate-800 mb-8">Estado de Tanques</h1>
                    <div class="grid grid-cols-2 gap-8">
                        ${state.tanques.map(t => `
                            <div class="glass p-8 space-y-6">
                                <div class="flex justify-between font-black uppercase text-xs text-slate-400">
                                    <span>${t.tipo}</span> <span>${t.stock} / ${t.total} L</span>
                                </div>
                                <div class="h-6 bg-slate-100 rounded-full overflow-hidden border-2 border-white shadow-inner">
                                    <div class="h-full bg-blue-600" style="width: ${(t.stock/t.total)*100}%"></div>
                                </div>
                                <button onclick="rellenar(${t.id})" class="w-full py-3 bg-slate-50 rounded-xl font-black text-[10px] text-slate-400 hover:text-blue-600 uppercase border border-slate-100">Rellenar al 100%</button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if (view === 'config') {
                main.innerHTML = `
                    <h2 class="text-2xl font-black mb-8">Parámetros del Sistema</h2>
                    <div class="max-w-xl glass p-8 space-y-6">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase block mb-2">Factor de Holgura (%)</label>
                            <input id="cfg-holgura" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none" value="${state.config.holgura}" onchange="updateCfg()">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase block mb-2">Cupo Base (L)</label>
                            <input id="cfg-base" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none" value="${state.config.base}" onchange="updateCfg()">
                        </div>
                    </div>
                `;
            }
        }

        // --- LÓGICA POS ---
        function validarPOS() {
            const placa = document.getElementById('input-placa').value.toUpperCase().trim();
            if(!placa) return;

            let cli = state.clientes.find(c => c.placa === placa);
            if(!cli) {
                cli = { placa, estado: "Activo" };
                state.clientes.push(cli);
            }

            if(cli.estado === 'Suspendido') {
                alert("BLOQUEO: Esta placa se encuentra SUSPENDIDA por la ANH.");
                return;
            }

            // Algoritmo 28 días
            const p28 = new Date(); p28.setDate(p28.getDate() - 28);
            const vs = state.ventas.filter(v => v.placa === placa && new Date(v.fecha) >= p28);
            const sum = vs.reduce((a,b)=>a+b.cant, 0); const ps = sum / 4;
            const lim = sum === 0 ? state.config.base : ps * (1 + (parseFloat(state.config.holgura) / 100));

            const container = document.getElementById('pos-container');
            container.innerHTML = `
                <div class="glass p-10 border-t-8 border-blue-600 shadow-xl space-y-8">
                    <div class="flex justify-between border-b pb-6">
                        <div><h3 class="text-2xl font-black">${placa}</h3><p class="text-blue-600 font-bold">HABILITADO ANH ✓</p></div>
                        <div class="text-right"><p class="text-[10px] font-bold text-slate-400 uppercase">Límite</p><h3 class="text-4xl font-black">${lim.toFixed(1)} L</h3></div>
                    </div>
                    <div class="space-y-4">
                        <input id="cant-vender" type="number" class="w-full text-center text-6xl font-black p-8 bg-blue-50 text-blue-600 rounded-3xl outline-none" placeholder="0.0">
                        <button onclick="procesarVenta('${placa}', ${lim})" class="w-full h-20 bg-blue-600 text-white rounded-3xl font-black text-2xl shadow-xl">AUTORIZAR CARGA</button>
                        <button onclick="showView('pos')" class="w-full text-slate-400 text-sm font-bold">Cancelar</button>
                    </div>
                </div>
            `;
        }

        function procesarVenta(placa, limite) {
            const cant = parseFloat(document.getElementById('cant-vender').value);
            if(!cant || cant <= 0 || cant > limite) return alert("Cantidad inválida o excede límite.");

            state.ventas.unshift({ placa, cant, fecha: new Date().toISOString() });
            state.tanques[0].stock -= cant;
            save();

            const container = document.getElementById('pos-container');
            container.innerHTML = `
                <div class="glass p-12 text-center space-y-6 shadow-2xl">
                    <div class="text-6xl mb-4">✅</div>
                    <h2 class="text-3xl font-black text-blue-600">Venta Exitosa</h2>
                    <p class="font-bold text-slate-500">Stock descontado en tiempo real.</p>
                    <button onclick="showView('pos')" class="w-full h-16 bg-slate-900 text-white rounded-2xl font-black">NUEVA CARGA</button>
                </div>
            `;
        }

        // --- AYUDANTES ---
        function rellenar(id) {
            state.tanques = state.tanques.map(t => t.id === id ? {...t, stock: t.total} : t);
            save(); alert("Tanque rellenado."); showView('inventario');
        }

        function updateCfg() {
            state.config.holgura = document.getElementById('cfg-holgura').value;
            state.config.base = document.getElementById('cfg-base').value;
            save();
        }

        // Inicio
        showView('dashboard');
    </script>
</body>
</html>
